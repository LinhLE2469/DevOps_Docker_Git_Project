---
# tasks file for roles/docker
# Install prerequisites for Docker
- name: Install required packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - python3-venv
    state: latest
    update_cache: yes

# Add Docker's official GPG key
- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/debian/gpg
    state: present

# Set up the Docker stable repository
- name: Add Docker APT repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/debian {{ ansible_facts['distribution_release'] }} stable"
    state: present
    update_cache: yes

# Install Docker
- name: Install Docker
  apt:
    name: docker-ce
    state: present

# Install Python3 and pip3
- name: Install Python3, pip3, and docker SDK
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - python3-docker
    state: present

# Ensure Docker is running
- name: Make sure Docker is running
  service:
    name: docker
    state: started
    enabled: yes

# Add admin user to docker group
- name: Add admin user to docker group
  user:
    name: admin
    groups: docker
    append: yes

# Restart docker to apply group changes
- name: Restart docker service
  service:
    name: docker
    state: restarted

# Wait for Docker daemon startup
- name: Wait for Docker daemon startup
  pause:
    seconds: 15

# Reset connection to apply group membership changes
- name: Reset connection to apply group changes
  meta: reset_connection

# Verify Docker is working for the admin user
- name: Verify Docker works
  become_user: admin
  command: docker ps
  register: docker_verify
  retries: 5
  delay: 2
  until: docker_verify is succeeded

