version: '2.4'

services:
  database:
    build: ./database
    image: my-database:1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usr -d db || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: usr
      POSTGRES_PASSWORD: pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    image: my-backend:1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      database:
       condition: service_healthy
    networks:
      - frontend
      - backend
    # backend is now internal-only; the proxy will expose host port 8080
    restart: unless-stopped

  front:
    build: ./front
    image: my-front:1.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frontend
    restart: unless-stopped

  proxy:
    build: ./proxy
    image: my-proxy:1.0
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
      front:
        condition: service_healthy
    networks:
      - frontend
    restart: unless-stopped


networks:
  frontend:
    driver: bridge

  backend:
    driver: bridge
    internal: true

volumes:
  pgdata:

