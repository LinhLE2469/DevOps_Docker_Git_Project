ServerRoot "/usr/local/apache2"
Listen 80

LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule authn_core_module modules/mod_authn_core.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule access_compat_module modules/mod_access_compat.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule dir_module modules/mod_dir.so
LoadModule alias_module modules/mod_alias.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule mime_module modules/mod_mime.so
LoadModule negotiation_module modules/mod_negotiation.so
LoadModule headers_module modules/mod_headers.so

# Proxy modules
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so

ServerName localhost
ServerAdmin you@example.com

# DocumentRoot is not used - all routing via VirtualHost
# DocumentRoot "/usr/local/apache2/htdocs"
# <Directory "/usr/local/apache2/htdocs">
#     Options Indexes FollowSymLinks
#     AllowOverride None
#     Require all granted
#     DirectoryIndex index.html
# </Directory>

# Basic logging to stdout/stderr (useful when running in a container)
ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 common

# Disable forward proxy
ProxyRequests Off

# Allow proxying to backend
<Proxy *>
    Require all granted
</Proxy>

# Global proxy settings - apply to ALL requests regardless of VirtualHost
ProxyPreserveHost On
ProxyRequests Off

# Route specific API endpoints to backend
ProxyPass "/departments" "http://backend:8080/departments"
ProxyPassReverse "/departments" "http://backend:8080/departments"

ProxyPass "/students" "http://backend:8080/students"
ProxyPassReverse "/students" "http://backend:8080/students"

# Default: everything else to frontend (must be last)
ProxyPass "/" "http://front/"
ProxyPassReverse "/" "http://front/"

# Reverse proxy VirtualHost (minimal config)
<VirtualHost *:80>
    ServerName thi.le.takima.school
    ServerAlias *
</VirtualHost>

# End of file