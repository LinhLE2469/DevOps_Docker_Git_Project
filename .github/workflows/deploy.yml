name: Deploy 
on:
  # Trigger only after test.yml succeeds on main branch
  workflow_run:
    workflows: ["Test & Quality Gate"]
    types: [completed]
    branches: [main]

jobs:
  # ========================================
  # Job 1: Build & Push Docker Images
  # ========================================
  # Triggered when test.yml workflow succeeds
  # Builds 3 Docker images and pushes to DockerHub
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: tp-devops-simple-api
          - name: database
            context: ./database
            image: tp-devops-database
          - name: frontend
            context: ./front
            image: tp-devops-front
          - name: httpd
            context: ./proxy
            image: tp-devops-httpd

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          push: true

  # ========================================
  # Job 2: Deploy to Remote Server
  # ========================================
  # Runs after deploy job completes successfully
  # Connects via SSH and runs Ansible playbook
  deploy-server:
    needs: deploy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ANSIBLE_INVENTORY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook -i "${{ secrets.ANSIBLE_INVENTORY_HOST }}," \
            -u admin --private-key ~/.ssh/deploy_key \
            -e ansible_python_interpreter=/usr/bin/python3 \
            playbook.yml
