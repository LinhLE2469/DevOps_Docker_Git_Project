name: Build & Push Images
on:
  # Trigger only after test.yml succeeds on main branch
  workflow_run:
    workflows: ["Test & Quality Gate"]
    types: [completed]
    branches: [main]

jobs:
  # Triggered when test.yml workflow succeeds.
  # Builds and pushes all runtime images to DockerHub.
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            image: tp-devops-simple-api
          - name: database
            context: ./database
            image: tp-devops-database
          - name: frontend
            context: ./front
            image: tp-devops-front
          - name: httpd
            context: ./proxy
            image: tp-devops-httpd

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          push: true
