name: Test & Quality Gate
on:
  # Run on all branches
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      # Checkout code from GitHub
      - uses: actions/checkout@v4

      # Setup Java JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build and run tests with Maven
      - name: Build and test with Maven
        run: mvn -B clean verify --file backend/pom.xml

      # Run SonarCloud quality analysis
      - name: Run SonarCloud analysis
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }} --file backend/pom.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
